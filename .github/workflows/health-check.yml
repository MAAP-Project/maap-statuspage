name: Scheduled Health Check

# Controls when the action will run.
on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '30 * * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  health_check_job:
    runs-on: ubuntu-latest
    name: Check all sites
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Shell Script
        id: shell_script_run
        run: |
          bash ./health-check.sh
      - name: setup git config
        run: |
          # setup the username and email.
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: commit
        run: |
          # Stage the file, commit and push
          git add -A --force logs/
          git commit -am '[Automated] Update Health Check Logs' || echo "No changes to commit"
          git push origin main || echo "Push failed; check permissions"

  # Single deploy job since we're just deploying
  deploy:
    needs: health_check_job
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Prepare site artifact
        run: |
          rm -rf site
          mkdir -p site
          # Copy logs into site so Pages serves them
          if [ -d logs ]; then
            cp -r logs site/logs
          fi
          # Create a minimal index.html at the site root so Pages has an entrypoint
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html>
          <head><meta charset="utf-8"><title>Health Check Logs</title></head>
          <body>
            <h1>Health Check Logs</h1>
            <p>Browse the <a href="./logs/">logs directory</a>.</p>
          </body>
          </html>
          EOF
          # Prevent Jekyll processing if there are files with leading underscores
          touch site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
